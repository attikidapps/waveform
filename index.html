<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WAVFORM — Independent Music</title>
<meta property="og:title" content="WAVFORM — Independent Music"/>
<meta property="og:description" content="Stream independent music, no signup required."/>
<meta property="og:type" content="website"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;
  --bg2:#0d1018;
  --bg3:#12151e;
  --surface:#181c28;
  --surface2:#1e2333;
  --border:#ffffff0f;
  --border2:#ffffff18;
  --accent:#e8ff47;
  --accent2:#ff4757;
  --accent3:#47b8ff;
  --text:#f0f2ff;
  --text2:#8892b0;
  --text3:#4a5568;
  --radius:10px;
  --player-h:80px;
  --sidebar-w:220px;
  --font-head:'Syne',sans-serif;
  --font-mono:'Space Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-head);overflow-x:hidden;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.main-layout{display:flex;flex:1;padding-bottom:var(--player-h)}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;padding-bottom:var(--player-h);display:flex;flex-direction:column;z-index:50;transition:transform .3s ease}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo-text span{color:var(--accent)}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section-label{padding:16px 20px 6px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
.nav-item:hover{color:var(--text);background:var(--border)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent)0a}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.page-content{margin-left:var(--sidebar-w);flex:1;min-height:calc(100vh - var(--player-h));overflow-y:auto}
.page-inner{padding:32px 36px;max-width:1200px}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:40;background:var(--bg)cc;backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 36px;height:60px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:18px;font-weight:700}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#d4e830;transform:translateY(-1px)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}
.btn-danger{background:#ff475720;color:var(--accent2);border:1px solid var(--accent2)40}
.btn-danger:hover{background:var(--accent2);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:8px}

/* ── HERO ── */
.hero{position:relative;padding:48px 36px 40px;overflow:hidden;border-bottom:1px solid var(--border)}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 50%,var(--accent)10,transparent),radial-gradient(ellipse 40% 60% at 20% 20%,var(--accent3)08,transparent);pointer-events:none}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent)15;border:1px solid var(--accent)30;color:var(--accent);padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.hero-title{font-size:clamp(32px,5vw,56px);font-weight:800;line-height:1.05;letter-spacing:-1.5px;margin-bottom:12px}
.hero-sub{font-size:15px;color:var(--text2);max-width:480px;line-height:1.6}
.hero-stats{display:flex;gap:32px;margin-top:28px}
.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat-num{font-size:28px;font-weight:800;color:var(--accent)}
.hero-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

/* ── SECTION HEADERS ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:19px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.section-title .badge{background:var(--accent);color:#000;font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:.5px}
.section-link{font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.section-link:hover{color:var(--accent)}

/* ── TRACK ROW ── */
.track-list{display:flex;flex-direction:column;gap:2px}
.track-row{display:grid;grid-template-columns:32px 1fr auto auto;gap:12px;align-items:center;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .12s;border:1px solid transparent}
.track-row:hover{background:var(--surface);border-color:var(--border)}
.track-row.playing{background:var(--accent)08;border-color:var(--accent)20}
.track-num{font-family:var(--font-mono);font-size:12px;color:var(--text3);text-align:center;min-width:20px}
.track-row.playing .track-num{color:var(--accent)}
.track-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.track-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-row.playing .track-name{color:var(--accent)}
.track-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.track-plays{font-family:var(--font-mono);font-size:11px;color:var(--text3);white-space:nowrap}
.track-dur{font-family:var(--font-mono);font-size:11px;color:var(--text3)}
.play-icon-btn{width:28px;height:28px;border-radius:50%;background:var(--accent)00;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.track-row:hover .play-icon-btn,.track-row.playing .play-icon-btn{background:var(--accent);color:#000}

/* ── MIXTAPE CARDS ── */
.mixtape-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.mixtape-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.mixtape-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px #000a}
.mixtape-art{aspect-ratio:1;position:relative;overflow:hidden;background:var(--bg3)}
.mixtape-art-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
.mixtape-art-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,#0008)}
.mixtape-art-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0006;opacity:0;transition:opacity .2s}
.mixtape-card:hover .mixtape-art-overlay{opacity:1}
.mixtape-play-btn{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#000;transform:scale(.8);transition:transform .2s}
.mixtape-card:hover .mixtape-play-btn{transform:scale(1)}
.mixtape-info{padding:14px}
.mixtape-title{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mixtape-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}

/* ── TRENDING ── */
.trending-list{display:flex;flex-direction:column;gap:4px}
.trending-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .12s}
.trending-item:hover{background:var(--surface)}
.trending-rank{font-family:var(--font-mono);font-size:11px;color:var(--text3);width:20px;text-align:center;flex-shrink:0}
.trending-rank.top3{color:var(--accent);font-weight:700}
.trending-bar{flex:1;min-width:0}
.trending-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trending-plays{font-size:11px;color:var(--text3);font-family:var(--font-mono)}
.trending-progress{height:2px;background:var(--border);border-radius:1px;margin-top:5px;overflow:hidden}
.trending-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .3s}

/* ── SONG PAGE ── */
.song-hero{padding:36px;background:linear-gradient(to bottom,var(--surface),transparent);border-bottom:1px solid var(--border)}
.song-hero-inner{display:flex;gap:28px;align-items:center;max-width:700px}
.song-art{width:110px;height:110px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0;box-shadow:0 8px 32px #0008}
.song-details{flex:1}
.song-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.song-title-big{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-bottom:8px}
.song-info-row{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text3)}
.song-actions{display:flex;gap:8px;margin-top:14px}

/* ── COMMENTS ── */
.comment-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.comment-form-title{font-size:14px;font-weight:700;margin-bottom:14px}
.form-row{display:flex;gap:10px;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:6px;flex:1}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.form-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);transition:border-color .15s;outline:none;resize:none}
.form-input:focus{border-color:var(--accent)60;box-shadow:0 0 0 2px var(--accent)10}
.form-input::placeholder{color:var(--text3)}
.captcha-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;font-size:13px;margin-bottom:10px}
.captcha-question{font-family:var(--font-mono);font-weight:700;color:var(--accent)}
.captcha-input{background:none;border:none;outline:none;font-family:var(--font-mono);font-size:14px;width:50px;border-bottom:1px solid var(--border2);padding-bottom:2px;text-align:center}
.comment-list{display:flex;flex-direction:column;gap:12px}
.comment-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.comment-author{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.comment-author-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.comment-time{font-size:11px;color:var(--text3);font-family:var(--font-mono)}
.comment-text{font-size:13px;color:var(--text2);line-height:1.6}

/* ── BOTTOM PLAYER ── */
.player{position:fixed;bottom:0;left:0;right:0;height:var(--player-h);background:var(--bg2);border-top:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px;gap:16px}
.player-track{display:flex;align-items:center;gap:12px;width:240px;flex-shrink:0}
.player-art{width:46px;height:46px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.player-info{min-width:0}
.player-song{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.player-song:hover{color:var(--accent)}
.player-artist{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-controls{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;flex-direction:column;gap:6px}
.player-btns{display:flex;align-items:center;gap:4px}
.ctrl-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.ctrl-btn:hover{color:var(--text);background:var(--border)}
.ctrl-btn.main-play{width:40px;height:40px;background:var(--accent);color:#000;border-radius:50%}
.ctrl-btn.main-play:hover{background:#d4e830;transform:scale(1.05)}
.progress-bar{display:flex;align-items:center;gap:8px;width:100%;max-width:480px}
.progress-track{flex:1;height:3px;background:var(--surface2);border-radius:2px;cursor:pointer;position:relative;overflow:visible}
.progress-track:hover{height:5px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;pointer-events:none;transition:width .1s linear}
.progress-thumb{width:10px;height:10px;border-radius:50%;background:var(--accent);position:absolute;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0;transition:opacity .15s}
.progress-track:hover .progress-thumb{opacity:1}
.time-label{font-family:var(--font-mono);font-size:10px;color:var(--text3);white-space:nowrap}
.player-right{display:flex;align-items:center;gap:8px;width:200px;justify-content:flex-end;flex-shrink:0}
.volume-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer}
.player-idle{color:var(--text3);font-size:13px;text-align:center;flex:1}

/* ── ADMIN ── */
.admin-layout{display:flex;min-height:100vh}
.admin-sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.admin-logo{padding:4px 20px 20px;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:12px}
.admin-logo span{color:var(--accent)}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.admin-nav-item:hover{color:var(--text);background:var(--border)}
.admin-nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent)0a}
.admin-content{margin-left:220px;flex:1;padding:28px 32px}
.admin-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.admin-page-title{font-size:22px;font-weight:800;letter-spacing:-.3px}

/* ── ADMIN CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--accent)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.data-table tr:hover td{background:var(--surface)}
.data-table tr:last-child td{border-bottom:none}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.5px}
.tag-green{background:#22c55e18;color:#4ade80;border:1px solid #22c55e30}
.tag-yellow{background:#f59e0b18;color:#fbbf24;border:1px solid #f59e0b30}
.tag-red{background:#ef444418;color:#f87171;border:1px solid #ef444430}

/* ── MODALS ── */
.modal-backdrop{position:fixed;inset:0;background:#000a;backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)50}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent)05}
.upload-zone svg{width:32px;height:32px;color:var(--text3);margin-bottom:10px}
.upload-zone-title{font-size:14px;font-weight:600;margin-bottom:4px}
.upload-zone-sub{font-size:12px;color:var(--text3)}
.upload-progress{background:var(--surface);border-radius:8px;padding:12px;margin-top:12px}
.upload-prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.upload-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 60% 60% at 50% 50%,var(--accent)06,transparent)}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-text{font-size:24px;font-weight:800;letter-spacing:-.5px}
.login-logo-text span{color:var(--accent)}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.form-group input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--accent)60;box-shadow:0 0 0 2px var(--accent)10}
.login-error{background:#ef444415;border:1px solid #ef444430;color:#f87171;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}

/* ── TOAST ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn .2s ease;min-width:220px;max-width:320px}
.toast.success{border-color:#22c55e40;background:#22c55e10}
.toast.error{border-color:var(--accent2)40;background:var(--accent2)10}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toast.success .toast-dot{background:#22c55e}
.toast.error .toast-dot{background:var(--accent2)}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.animate-pulse{animation:pulse 1.5s ease infinite}
.spin{animation:spin .8s linear infinite}
.fade-in{animation:fadeIn .25s ease}

/* ── MISC ── */

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE

const audio = new Audio();
audio.volume = STATE.volume;

// Simulate playback with a synthetic oscillator for demo
let oscCtx = null, oscNode = null, gainNode = null;

function createDemoAudio() {
  if (!oscCtx) {
    try {
      oscCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = oscCtx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(oscCtx.destination);
    } catch(e) {}
  }
}

function playDemoTone() {
  createDemoAudio();
  if (!oscCtx) return;
  if (oscNode) { try { oscNode.stop(); } catch(e){} }
  oscNode = oscCtx.createOscillator();
  oscNode.frequency.value = 220 + Math.random() * 100;
  oscNode.type = 'sine';
  oscNode.connect(gainNode);
  gainNode.gain.setTargetAtTime(0.05 * STATE.volume, oscCtx.currentTime, 0.1);
  oscNode.start();
}

function stopDemoTone() {
  if (gainNode) gainNode.gain.setTargetAtTime(0, oscCtx?.currentTime || 0, 0.1);
  setTimeout(() => { if (oscNode) { try { oscNode.stop(); } catch(e){} oscNode = null; } }, 200);
}

let simulTimer = null, simulTime = 0, simulDur = 0;

function startSimulation(song) {
  clearInterval(simulTimer);
  simulTime = 0;
  const parts = song.duration.split(':');
  simulDur = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  STATE.duration = simulDur;
  STATE.currentTime = 0;
  simulTimer = setInterval(() => {
    if (!STATE.isPlaying) return;
    simulTime += 0.25;
    STATE.currentTime = simulTime;
    if (simulTime >= simulDur) {
      clearInterval(simulTimer);
      nextTrack();
    }
    updatePlayerUI();
  }, 250);
}

function playSong(song, queue = null) {
  if (queue) { STATE.queue = queue; STATE.queueIdx = queue.findIndex(s=>s.id===song.id); }
  STATE.currentSong = song;
  STATE.isPlaying = true;
  if (song.src) {
    audio.src = song.src; audio.play().catch(()=>{});
  } else { playDemoTone(); }
  startSimulation(song);
  schedulePlayCount(song);
  render();
}

function togglePlay() {
  if (!STATE.currentSong) return;
  STATE.isPlaying = !STATE.isPlaying;
  if (STATE.isPlaying) {
    if (!STATE.currentSong.src) playDemoTone();
  } else {
    stopDemoTone();
  }
  render();
}

function nextTrack() {
  if (!STATE.queue.length) return;
  STATE.queueIdx = (STATE.queueIdx + 1) % STATE.queue.length;
  playSong(STATE.queue[STATE.queueIdx], STATE.queue);
}

function prevTrack() {
  if (!STATE.queue.length) return;
  STATE.queueIdx = (STATE.queueIdx - 1 + STATE.queue.length) % STATE.queue.length;
  playSong(STATE.queue[STATE.queueIdx], STATE.queue);
}

function seekTo(pct) {
  simulTime = pct * simulDur;
  STATE.currentTime = simulTime;
  updatePlayerUI();
}

function setVolume(v) {
  STATE.volume = v;
  audio.volume = v;
  if (gainNode) gainNode.gain.value = 0.05 * v;
  updatePlayerUI();
}

let playCountTimers = {};
function schedulePlayCount(song) {
  clearTimeout(playCountTimers[song.id]);
  const key = song.id + '_' + Date.now().toString().slice(-6);
  if (STATE.sessionPlayed.has(song.id)) return;
  const threshold = Math.min(15, simulDur * 0.5);
  playCountTimers[song.id] = setTimeout(() => {
    if (STATE.currentSong?.id === song.id && STATE.isPlaying) {
      STATE.sessionPlayed.add(song.id);
      const s = STATE.songs.find(x=>x.id===song.id);
      if (s) { s.plays++; s.weekPlays++; }
      STATE.playLog.push({ songId: song.id, time: new Date().toISOString() });
      persist();
    }
  }, threshold * 1000);
}

function formatTime(s) {
  if (!s && s !== 0) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function fmtPlays(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : n; }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtRelTime(d) {
  const diff = Date.now() - new Date(d);
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return Math.floor(diff/86400000)+'d ago';
}
function genId() { return Math.random().toString(36).slice(2,10); }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }

function showToast(msg, type='success') {
  const tc = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-dot"></div>${msg}`;
  tc.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3000);
}

const PROFANITY = ['badword','spam'];
function hasProfanity(s) { return PROFANITY.some(w=>s.toLowerCase().includes(w)); }

function renderTrendingList(songs, full=false) {
  const max = Math.max(...songs.map(s=>s.weekPlays),1);
  return `<div class="trending-list">
  ${songs.map((s,i)=>`
  <div class="trending-item" data-play-song="${s.id}">
    <div class="trending-rank${i<3?' top3':''}">${i+1}</div>
    <div class="trending-bar">
      <div class="trending-name">${s.title}</div>
      ${full?`<div class="trending-progress"><div class="trending-fill" style="width:${Math.round(s.weekPlays/max*100)}%"></div></div>`:''}
    </div>
    <div style="text-align:right">
      <div class="trending-plays">${fmtPlays(s.weekPlays)} plays</div>
      ${full?`<div style="font-size:10px;color:var(--text3)">${s.duration}</div>`:''}
    </div>
    <div class="play-icon-btn">${STATE.currentSong?.id===s.id&&STATE.isPlaying?Icons.pause:Icons.play}</div>
  </div>`).join('')}
</div>`;
}

  return `

function renderCommentForm(songId) {
  return `<div class="comment-form" id="comment-form-${songId}">

function renderComment(c) {
  return `<div class="comment-card" id="comment-${c.id}">

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMixtapeCard(m) {
  const songs = STATE.songs.filter(s=>s.mixtapeId===m.id);

}

function renderTrackList(songs, queue) {
  return `<div class="track-list">
  ${songs.map((s,i)=>`

function renderPlayer() {

  return `<div class="player" id="player">
  <div class="player-track">
    ${s ? `
    <div class="player-art">${s.emoji}</div>

  </div>
  <div class="player-controls">

      <button class="ctrl-btn" id="prev-btn" title="Previous">${Icons.prev}</button>
      <button class="ctrl-btn main-play" id="main-play" title="${STATE.isPlaying?'Pause':'Play'}">${STATE.isPlaying?Icons.pause:Icons.play}</button>
      <button class="ctrl-btn" id="next-btn" title="Next">${Icons.skip}</button>
    </div>

      <span class="time-label">${formatTime(STATE.currentTime)}</span>
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
        <div class="progress-thumb" style="left:calc(${pct}% - 5px)"></div>
      </div>
      <span class="time-label">${formatTime(STATE.duration)}</span>
    </div>
  </div>
  <div class="player-right">
    ${Icons.volume}
    <input type="range" class="volume-slider" id="vol-slider" min="0" max="1" step="0.01" value="${STATE.volume}"/>
  </div>
</div>`;
}

function updatePlayerUI() {
  const s = STATE.currentSong;
  const pct = STATE.duration ? (STATE.currentTime / STATE.duration * 100) : 0;
  const pf = document.querySelector('.progress-fill');
  const pt = document.querySelector('.progress-thumb');
  const tls = document.querySelectorAll('.time-label');
  if (pf) pf.style.width = pct+'%';
  if (pt) pt.style.left = `calc(${pct}% - 5px)`;
  if (tls[0]) tls[0].textContent = formatTime(STATE.currentTime);
  if (tls[1]) tls[1].textContent = formatTime(STATE.duration);
}

// ── MODALS ──
function renderModal() {
  const m = STATE.showModal;
  if (m.type === 'edit-song') return renderEditSongModal(m.id);
  if (m.type === 'edit-mixtape') return renderEditMixtapeModal(m.id);
  if (m.type === 'new-mixtape') return renderNewMixtapeModal();
  if (m.type === 'confirm-delete') return renderConfirmModal(m);
  return '';
}

function renderEditSongModal(id) {
  const s = STATE.songs.find(x=>x.id===id);
  if (!s) return '';
  return `<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Edit Song</div><button class="btn btn-ghost btn-sm btn-icon" id="modal-close">${Icons.close}</button></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
      <div class="form-field"><label class="form-label">Title</label><input class="form-input" id="m-title" value="${s.title}"/></div>
      <div class="form-field"><label class="form-label">Slug</label><input class="form-input" id="m-slug" value="${s.slug}"/></div>
      <div class="form-field"><label class="form-label">Mixtape</label>
        <select class="form-input" id="m-mixtape">
          ${STATE.mixtapes.map(m=>`<option value="${m.id}"${m.id===s.mixtapeId?' selected':''}>${m.title}</option>`).join('')}
        </select>
      </div>
      <div class="form-field"><label class="form-label">Duration</label><input class="form-input" id="m-dur" value="${s.duration}"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-close2">Cancel</button>
      <button class="btn btn-primary" data-save-song="${id}">Save Changes</button>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════
// EVENT HANDLING
// ═══════════════════════════════════════════════════════
function attachEvents() {
  // Sidebar nav
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const page = el.dataset.nav;
      const mixtape = el.dataset.mixtape;
      if (page==='mixtape' && mixtape) { nav('mixtape',{mixtapeId:mixtape}); }
      else nav(page);
    });
  });

  // Mobile menu
  const menuBtn = document.getElementById('menu-btn');
  if (menuBtn) menuBtn.onclick = ()=>{ STATE.sidebarOpen=!STATE.sidebarOpen; render(); };
  const adminMenuBtn = document.getElementById('admin-menu-btn');
  if (adminMenuBtn) adminMenuBtn.onclick = ()=>{ STATE.adminSidebarOpen=!STATE.adminSidebarOpen; render(); };
  const overlay = document.getElementById('overlay');
  if (overlay) overlay.onclick = ()=>{ STATE.sidebarOpen=false; render(); };
  const adminOverlay = document.getElementById('admin-overlay');
  if (adminOverlay) adminOverlay.onclick = ()=>{ STATE.adminSidebarOpen=false; render(); };

  // Play song buttons
  document.querySelectorAll('[data-play-song]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const id = el.dataset.playSong;
      const song = STATE.songs.find(s=>s.id===id);
      if (!song) return;
      if (STATE.currentSong?.id===id) { togglePlay(); return; }
      // get queue from closest row
      const row = el.closest('[data-queue]');
      let queue = STATE.songs;
      if (row?.dataset.queue) {
        try { const ids = JSON.parse(row.dataset.queue); queue = ids.map(i=>STATE.songs.find(s=>s.id===i)).filter(Boolean); } catch(e){}
      }
      playSong(song, queue);
    });
  });

  // Play mixtape
  document.querySelectorAll('[data-play-mixtape]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const id = el.dataset.playMixtape;
      const songs = STATE.songs.filter(s=>s.mixtapeId===id);
      if (songs.length) playSong(songs[0], songs);
    });
  });

  // Trending play
  document.querySelectorAll('[data-play-song]').forEach(el=>{});

  // Song detail link
  document.querySelectorAll('[data-song-detail]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      nav('song',{slug:el.dataset.songDetail});
    });
  });

  // Section link
  document.querySelectorAll('[data-nav]').forEach(()=>{});

  // Player controls
  const mainPlay = document.getElementById('main-play');
  if (mainPlay) mainPlay.onclick = togglePlay;
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.onclick = nextTrack;
  const prevBtn = document.getElementById('prev-btn');
  if (prevBtn) prevBtn.onclick = prevTrack;
  const progTrack = document.getElementById('progress-track');
  if (progTrack) {
    progTrack.addEventListener('click', e=>{
      const rect = progTrack.getBoundingClientRect();
      seekTo((e.clientX-rect.left)/rect.width);
    });
  }
  const volSlider = document.getElementById('vol-slider');
  if (volSlider) volSlider.oninput = ()=>setVolume(parseFloat(volSlider.value));

  // Share
  const shareBtn = document.getElementById('share-btn');
  if (shareBtn) shareBtn.onclick = ()=>{
    const url = window.location.href;
    if (navigator.share) { navigator.share({title:STATE.currentSong?.title||'WAVFORM',url}); }
    else { navigator.clipboard.writeText(url); showToast('Link copied!'); }
  };

  // Comments
  document.querySelectorAll('[data-submit-comment]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const songId = el.dataset.submitComment;
      const name = (document.getElementById('comment-name')?.value||'').trim() || 'Anonymous';
      const text = (document.getElementById('comment-text')?.value||'').trim();
      const ans = parseInt(document.getElementById('captcha-ans')?.value||'');
      if (!text) { showToast('Please write a comment', 'error'); return; }
      if (ans !== STATE.captchaA + STATE.captchaB) { showToast('Captcha wrong!', 'error'); return; }
      if (hasProfanity(text)||hasProfanity(name)) { showToast('Comment contains prohibited content', 'error'); return; }
      STATE.comments.push({ id:genId(), songId, author:name, text, time:new Date().toISOString() });
      STATE.captchaA = Math.floor(Math.random()*10)+1;
      STATE.captchaB = Math.floor(Math.random()*10)+1;
      persist();
      showToast('Comment posted!');
      render();
    });
  });

  // Admin login
  const loginBtn = document.getElementById('admin-login-btn');
  if (loginBtn) loginBtn.onclick = ()=>{
    const u = document.getElementById('admin-user')?.value;
    const p = document.getElementById('admin-pass')?.value;
    if (u==='admin' && p==='wavform2024') {
      sessionStorage.setItem('wf_admin','1');
      STATE.adminLoggedIn = true;
      STATE.page = 'admin';
      STATE.adminPage = 'dashboard';
      render();
    } else {
      const err = document.getElementById('login-error');
      if (err) { err.style.display='block'; err.textContent='Invalid credentials. Try admin / wavform2024'; }
    }
  };
  // Allow enter key
  ['admin-user','admin-pass'].forEach(id=>{
    const el = document.getElementById(id);
    if (el) el.onkeydown = e=>{ if(e.key==='Enter') loginBtn?.click(); };
  });

  // Admin nav
  document.querySelectorAll('[data-admin-nav]').forEach(el=>{
    el.addEventListener('click', ()=>adminNav(el.dataset.adminNav));
  });

  // Admin logout
  const logoutBtn = document.getElementById('admin-logout-btn');
  if (logoutBtn) logoutBtn.onclick = ()=>{
    sessionStorage.removeItem('wf_admin');
    STATE.adminLoggedIn = false;
    STATE.page = 'home';
    render();
    showToast('Logged out');
  };

  // Admin delete song
  document.querySelectorAll('[data-delete-song]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.deleteSong;
      const s = STATE.songs.find(x=>x.id===id);
      STATE.showModal = { type:'confirm-delete', name:s?.title, onConfirm:()=>{
        STATE.songs = STATE.songs.filter(x=>x.id!==id);
        STATE.comments = STATE.comments.filter(c=>c.songId!==id);
        STATE.showModal = null;
        persist(); render(); showToast('Song deleted');
      }};
      render();
    });
  });

  // Admin edit song
  document.querySelectorAll('[data-edit-song]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.showModal={type:'edit-song',id:el.dataset.editSong}; render(); });
  });

  // Admin save song
  document.querySelectorAll('[data-save-song]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.saveSong;
      const s = STATE.songs.find(x=>x.id===id);
      if (!s) return;
      s.title = document.getElementById('m-title')?.value || s.title;
      s.slug = document.getElementById('m-slug')?.value || s.slug;
      s.mixtapeId = document.getElementById('m-mixtape')?.value || s.mixtapeId;
      s.duration = document.getElementById('m-dur')?.value || s.duration;
      STATE.showModal = null; persist(); render(); showToast('Song updated!');
    });
  });

  // Admin delete mixtape
  document.querySelectorAll('[data-delete-mixtape]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.deleteMixtape;
      const m = STATE.mixtapes.find(x=>x.id===id);
      STATE.showModal = { type:'confirm-delete', name:m?.title, onConfirm:()=>{
        STATE.mixtapes = STATE.mixtapes.filter(x=>x.id!==id);
        STATE.showModal = null;
        persist(); render(); showToast('Mixtape deleted');
      }};
      render();
    });
  });

  // Admin edit mixtape
  document.querySelectorAll('[data-edit-mixtape]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.showModal={type:'edit-mixtape',id:el.dataset.editMixtape}; render(); });
  });

  // Admin save mixtape
  document.querySelectorAll('[data-save-mixtape]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.saveMixtape;
      const m = STATE.mixtapes.find(x=>x.id===id);
      if (!m) return;
      m.title = document.getElementById('m-title')?.value || m.title;
      m.emoji = document.getElementById('m-emoji')?.value || m.emoji;
      m.releaseDate = document.getElementById('m-date')?.value || m.releaseDate;
      STATE.showModal = null; persist(); render(); showToast('Mixtape updated!');
    });
  });

  // New mixtape button
  const newMixtapeBtn = document.getElementById('new-mixtape-btn');
  if (newMixtapeBtn) newMixtapeBtn.onclick = ()=>{ STATE.showModal={type:'new-mixtape'}; render(); };

  // Save new mixtape
  const saveNewMixtape = document.getElementById('save-new-mixtape');
  if (saveNewMixtape) saveNewMixtape.onclick = ()=>{
    const title = document.getElementById('m-title')?.value?.trim();
    const emoji = document.getElementById('m-emoji')?.value || '🎵';
    const releaseDate = document.getElementById('m-date')?.value || new Date().toISOString().split('T')[0];
    if (!title) { showToast('Title required','error'); return; }
    STATE.mixtapes.push({ id:'m'+genId(), title, emoji, releaseDate, trackCount:0 });
    STATE.showModal = null; persist(); render(); showToast('Mixtape created!');
  };

  // Delete comment
  document.querySelectorAll('[data-delete-comment]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.deleteComment;
      STATE.comments = STATE.comments.filter(x=>x.id!==id);
      persist(); render(); showToast('Comment deleted');
    });
  });

  // Modal close
  ['modal-close','modal-close2'].forEach(id=>{
    const el = document.getElementById(id);
    if (el) el.onclick = ()=>{ STATE.showModal=null; render(); };
  });

  // Confirm delete
  const confirmBtn = document.getElementById('confirm-delete-btn');
  if (confirmBtn) confirmBtn.onclick = ()=>STATE.showModal?.onConfirm?.();

  // Modal backdrop click
  const modalBd = document.getElementById('modal-backdrop');
  if (modalBd) modalBd.addEventListener('click', e=>{ if(e.target===modalBd){STATE.showModal=null;render();} });

  // Upload zone
  const uploadZone = document.getElementById('upload-zone');
  const audioInput = document.getElementById('audio-file-input');
  if (uploadZone && audioInput) {
    uploadZone.onclick = ()=>audioInput.click();
    uploadZone.addEventListener('dragover', e=>{ e.preventDefault(); uploadZone.classList.add('drag'); });
    uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('drag'));
    uploadZone.addEventListener('drop', e=>{ e.preventDefault(); uploadZone.classList.remove('drag'); handleFileSelect(e.dataTransfer.files[0]); });
    audioInput.onchange = ()=>handleFileSelect(audioInput.files[0]);
  }

  // Auto slug
  const autoSlugBtn = document.getElementById('auto-slug-btn');
  if (autoSlugBtn) autoSlugBtn.onclick = ()=>{
    const title = document.getElementById('upload-title')?.value;
    if (title) { const slugEl = document.getElementById('upload-slug'); if(slugEl) slugEl.value = slugify(title); }
  };

  // Upload submit
  const uploadSubmit = document.getElementById('upload-submit-btn');
  if (uploadSubmit) uploadSubmit.onclick = submitUpload;
}

let _uploadedFile = null;
function handleFileSelect(file) {
  if (!file) return;
  _uploadedFile = file;
  const prog = document.getElementById('upload-progress');
  const fname = document.getElementById('upload-filename');
  const pct = document.getElementById('upload-pct');
  const fill = document.getElementById('upload-fill');
  if (prog) prog.style.display='block';
  if (fname) fname.textContent = file.name;
  // Simulate upload progress
  let p = 0;
  const iv = setInterval(()=>{
    p += Math.random()*15+5;
    if (p>=100) { p=100; clearInterval(iv); if(pct) pct.textContent='Ready'; }
    else { if(pct) pct.textContent = Math.round(p)+'%'; }
    if(fill) fill.style.width=p+'%';
  }, 100);
  // Auto-fill title from filename
  const titleEl = document.getElementById('upload-title');
  if (titleEl && !titleEl.value) {
    titleEl.value = file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
  }
}

function submitUpload() {
  const title = document.getElementById('upload-title')?.value?.trim();
  const slug = (document.getElementById('upload-slug')?.value?.trim()) || slugify(title||'');
  const mixtapeId = document.getElementById('upload-mixtape')?.value;
  const duration = document.getElementById('upload-duration')?.value?.trim() || '0:00';
  if (!title) { showToast('Song title required','error'); return; }
  if (!mixtapeId) { showToast('Please select a mixtape','error'); return; }
  const emoji = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  const newSong = {
    id: 's'+genId(), title, slug: slug||slugify(title), mixtapeId,
    plays: 0, weekPlays: 0, duration, src: '', emoji,
    dateAdded: new Date().toISOString().split('T')[0]
  };
  // If real file selected, create object URL
  if (_uploadedFile) { newSong.src = URL.createObjectURL(_uploadedFile); }
  STATE.songs.push(newSong);
  persist();
  showToast('Track uploaded successfully!');
  adminNav('songs');
  _uploadedFile = null;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
